<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray-Cast FOV Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #2a2a2a;
            cursor: crosshair;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        #roundTimer {
            position: absolute;
            top: 58px;
            right: 20px;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            color: #ffe082;
        }

        #editorLink {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #e7e7e7;
            text-decoration: none;
            padding: 6px 10px;
            border: 1px solid #737373;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: all;
        }

        #levelInfo {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #d8d8d8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #goal {
            position: absolute;
            top: 58px;
            left: 20px;
            font-size: 18px;
            color: #90caf9;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        #adsIndicator {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            padding: 8px 16px;
            background: rgba(255, 100, 100, 0.3);
            border: 2px solid #ff6464;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        #adsIndicator.active {
            opacity: 1;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 8px;
            display: none;
        }
        
        #gameOver.visible {
            display: block;
        }
        
        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6464;
        }
        
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #gameOverResult {
            font-size: 18px;
            margin-top: -12px;
            margin-bottom: 22px;
            color: #ffd28f;
        }
        
        #levelSelectButton {
            font-size: 20px;
            padding: 12px 24px;
            background: #ff6464;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            pointer-events: all;
            font-family: 'Courier New', monospace;
        }
        
        #levelSelectButton:hover {
            background: #ff8484;
        }

        #levelMenu {
            position: absolute;
            inset: 0;
            display: none;
            background: rgba(9, 11, 16, 0.92);
            color: #f7f7f7;
            pointer-events: all;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        #levelMenu.visible {
            display: flex;
        }

        .level-menu-card {
            width: min(720px, 90vw);
            max-height: 80vh;
            border: 1px solid #3b4554;
            background: #111721;
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 14px;
        }

        .level-menu-card h2 {
            font-size: 28px;
            margin: 0;
        }

        .level-list {
            overflow-y: auto;
            display: grid;
            gap: 8px;
            max-height: 50vh;
            padding-right: 4px;
        }

        .level-item {
            text-align: left;
            padding: 10px 12px;
            border: 1px solid #3f4d61;
            background: #1a2432;
            color: #f7f7f7;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        .level-item:hover {
            background: #243449;
        }

        #levelMenuStatus {
            color: #ffb4a9;
            min-height: 20px;
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div id="ui">
            <div id="score">SCORE: <span id="scoreValue">0</span></div>
            <div id="roundTimer">TIME: <span id="timerValue">2:00</span></div>
            <div id="levelInfo">LEVEL: <span id="levelName">-</span></div>
            <div id="goal">GOAL: <span id="goalValue">0/0</span></div>
            <a id="editorLink" href="./editor.html">Open Map Editor</a>
            <div id="adsIndicator">ADS ACTIVE</div>
            <div id="gameOver">
                <h1 id="gameOverTitle">TIME'S UP</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <p id="gameOverResult">You lost this level.</p>
                <button id="levelSelectButton">LEVEL SELECT</button>
            </div>
            <div id="levelMenu" class="visible">
                <div class="level-menu-card">
                    <h2>Select Level</h2>
                    <div id="levelList" class="level-list"></div>
                    <p id="levelMenuStatus"></p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Core Configuration -->
    <script src="config.js"></script>
    <script src="mapFormat.js"></script>
    
    <!-- Utilities -->
    <script src="utils/geometry.js"></script>
    <script src="utils/collision.js"></script>
    <script src="utils/raycaster.js"></script>
    
    <!-- Entity-Component System -->
    <script src="components.js"></script>
    <script src="entities.js"></script>
    
    <!-- Systems -->
    <script src="systems/inputSystem.js"></script>
    <script src="systems/movementSystem.js"></script>
    <script src="systems/aimingSystem.js"></script>
    <script src="systems/visionSystem.js"></script>
    <script src="systems/doorSystem.js"></script>
    <script src="systems/blockSystem.js"></script>
    <script src="systems/shootingSystem.js"></script>
    <script src="systems/renderSystem.js"></script>

    <!-- Deterministic Simulation Core -->
    <script src="core/mapBuildUtils.js"></script>
    <script src="core/roundUtils.js"></script>
    <script src="core/targetSpawnUtils.js"></script>
    <script src="core/simulationCore.js"></script>
    
    <!-- Game Loop -->
    <script src="game.js"></script>
</body>
</html>
