<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray-Cast FOV Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #2a2a2a;
            cursor: crosshair;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        #adsIndicator {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            padding: 8px 16px;
            background: rgba(255, 100, 100, 0.3);
            border: 2px solid #ff6464;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        #adsIndicator.active {
            opacity: 1;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 8px;
            display: none;
        }
        
        #gameOver.visible {
            display: block;
        }
        
        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6464;
        }
        
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        #restartButton {
            font-size: 20px;
            padding: 12px 24px;
            background: #ff6464;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            pointer-events: all;
            font-family: 'Courier New', monospace;
        }
        
        #restartButton:hover {
            background: #ff8484;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div id="ui">
            <div id="score">SCORE: <span id="scoreValue">0</span></div>
            <div id="adsIndicator">ADS ACTIVE</div>
            <div id="gameOver">
                <h1>ALL TARGETS ELIMINATED</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartButton">RESTART</button>
            </div>
        </div>
    </div>
    
    <!-- Core Configuration -->
    <script src="config.js"></script>
    
    <!-- Utilities -->
    <script src="utils/geometry.js"></script>
    <script src="utils/collision.js"></script>
    <script src="utils/raycaster.js"></script>
    
    <!-- Entity-Component System -->
    <script src="components.js"></script>
    <script src="entities.js"></script>
    
    <!-- Systems -->
    <script src="systems/inputSystem.js"></script>
    <script src="systems/movementSystem.js"></script>
    <script src="systems/aimingSystem.js"></script>
    <script src="systems/visionSystem.js"></script>
    <script src="systems/doorSystem.js"></script>
    <script src="systems/shootingSystem.js"></script>
    <script src="systems/renderSystem.js"></script>
    
    <!-- Game Loop -->
    <script src="game.js"></script>
</body>
</html>
